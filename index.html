<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Untuk Ms. Wulan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f8f9ff;
padding:20px;
}

.card{
width:100%;
max-width:850px;
background:white;
border-radius:25px;
padding:40px;
box-shadow:0 20px 60px rgba(0,0,0,.08);
}

h1{
text-align:center;
color:#ff4f8b;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#777;
margin-bottom:30px;
}

#typing{
line-height:2;
font-size:16px;
color:#444;
white-space:pre-wrap;
min-height:280px;
}

.cursor{
display:inline-block;
animation:blink .8s infinite;
}

@keyframes blink{
50%{
opacity:0;
}
}

.footer{
margin-top:30px;
text-align:center;
font-weight:600;
color:#ff4f8b;
}

</style>
</head>
<body>

<div class="card">

<h1>💖 Untuk Ms. Wulan</h1>

<div class="subtitle">
Selamat Menempuh Perjalanan Baru
</div>

<div id="typing"></div>

<div class="footer">
Terima kasih atas semua kenangan indah 🌸
</div>

</div>

<script>

const text = `

Selamat tinggal bukan berarti melupakan.

Terima kasih Ms. Wulan atas ilmu, kesabaran,
dan perhatian yang telah diberikan selama
mengajar di SMK Pasundan 3 Cimahi.

Mungkin hari ini menjadi akhir dari perjalanan
sebagai guru di sekolah ini.

Namun setiap pelajaran, nasihat, dan kebaikan
yang pernah diberikan akan selalu hidup dalam
ingatan para siswa.

Semoga langkah baru yang ditempuh membawa
kebahagiaan, kesehatan, kesuksesan, dan
masa depan yang lebih indah.

Terima kasih telah menjadi bagian dari
cerita kami.

🌸 Sampai bertemu kembali, Ms. Wulan.
`;

let i = 0;
const target = document.getElementById("typing");

function typeWriter(){
if(i < text.length){
target.innerHTML =
text.substring(0,i+1) +
'<span class="cursor">|</span>';
i++;
setTimeout(typeWriter,35);
}
}

typeWriter();

</script>

</body>
</html>
