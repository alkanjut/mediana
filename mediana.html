<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mediana AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#0b1020;
    color:white;
    height:100vh;
    overflow:hidden;
}

.watermark{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) rotate(-25deg);
    font-size:120px;
    font-weight:900;
    color:rgba(255,255,255,.03);
    pointer-events:none;
    user-select:none;
    z-index:0;
}

.container{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    height:100vh;
}

.header{
    padding:20px;
    border-bottom:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,.03);
}

.logo{
    font-size:24px;
    font-weight:700;
    background:linear-gradient(90deg,#00d4ff,#8b5cf6);
    -webkit-background-clip:text;
    color:transparent;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:25px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.message{
    max-width:80%;
    padding:14px 18px;
    border-radius:18px;
    line-height:1.6;
    white-space:pre-wrap;
}

.user{
    align-self:flex-end;
    background:#2563eb;
}

.ai{
    align-self:flex-start;
    background:#141c34;
    border:1px solid rgba(255,255,255,.08);
}

.input-area{
    padding:20px;
    border-top:1px solid rgba(255,255,255,.08);
}

.input-box{
    display:flex;
    gap:10px;
    background:#141c34;
    border:1px solid rgba(255,255,255,.08);
    border-radius:16px;
    padding:10px;
}

textarea{
    flex:1;
    resize:none;
    border:none;
    outline:none;
    background:transparent;
    color:white;
    font-size:15px;
    min-height:50px;
}

button{
    border:none;
    background:linear-gradient(135deg,#00d4ff,#8b5cf6);
    color:white;
    font-weight:700;
    padding:12px 20px;
    border-radius:12px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

::-webkit-scrollbar{
    width:5px;
}
::-webkit-scrollbar-thumb{
    background:#4f46e5;
}
</style>
</head>
<body>

<div class="watermark">MEDIANA AI</div>

<div class="container">

<div class="header">
    <div class="logo">✨ Mediana AI</div>
</div>

<div id="chat" class="chat-box">
    <div class="message ai">
        Halo! Saya Mediana AI. Ada yang bisa saya bantu?
    </div>
</div>

<div class="input-area">
    <div class="input-box">
        <textarea id="prompt" placeholder="Tulis pesan..."></textarea>
        <button onclick="sendMessage()">Kirim</button>
    </div>
</div>

</div>

<script>

const GROQ_API_KEY = "MASUKKAN_API_KEY_GROQ_DISINI";

const chat = document.getElementById("chat");

function addMessage(text,type){
    const div = document.createElement("div");
    div.className = `message ${type}`;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

async function sendMessage(){

    const input = document.getElementById("prompt");
    const message = input.value.trim();

    if(!message) return;

    addMessage(message,"user");
    input.value="";

    const loading = addMessage("Mengetik...","ai");

    try{

        const res = await fetch(
            "https://api.groq.com/openai/v1/chat/completions",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "Authorization":"Bearer " + GROQ_API_KEY
                },
                body:JSON.stringify({
                    model:"llama-3.3-70b-versatile",
                    messages:[
                        {
                            role:"system",
                            content:"Kamu adalah Mediana AI, asisten AI modern dan profesional."
                        },
                        {
                            role:"user",
                            content:message
                        }
                    ],
                    temperature:0.7
                })
            }
        );

        const data = await res.json();

        loading.textContent =
            data.choices?.[0]?.message?.content ||
            "Tidak ada respon.";

    }catch(err){

        loading.textContent =
            "Gagal terhubung ke Groq API.";

        console.error(err);
    }
}
</script>

</body>
</html>
